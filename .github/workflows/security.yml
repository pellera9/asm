name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Mirrors scripts/security_check.py, the same runner invoked by the local
# pre-commit `security-check` hook. Failure parity with local: any HIGH or
# CRITICAL finding fails the job.

permissions:
  contents: read

jobs:
  local-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install trivy
        run: |
          TRIVY_VERSION=0.70.0
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin trivy
          trivy --version

      - name: Compute trivy cache week stamp
        id: trivy-cache-key
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Cache trivy vulnerability DB
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.trivy-cache-key.outputs.week }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Warm trivy vulnerability DB
        run: trivy fs --download-db-only .

      - name: Install semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep --version

      - name: Run local security checks
        run: python3 scripts/security_check.py

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-reports
          path: |
            security/security-report.json
            security/security-report.md

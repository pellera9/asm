<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12131a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#1e1f2e" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Logo: The Nexus -->
  <g transform="translate(600, 200) scale(5)">
    <line x1="8" y1="6.2" x2="8" y2="2" stroke="#00ff41" stroke-width="1.2"/>
    <line x1="9.5" y1="7" x2="13" y2="3.5" stroke="#00ff41" stroke-width="1.2"/>
    <line x1="9.5" y1="9" x2="13" y2="12.5" stroke="#00ff41" stroke-width="1.2"/>
    <line x1="8" y1="9.8" x2="8" y2="14" stroke="#00ff41" stroke-width="1.2"/>
    <line x1="6.5" y1="9" x2="3" y2="12.5" stroke="#00ff41" stroke-width="1.2"/>
    <line x1="6.5" y1="7" x2="3" y2="3.5" stroke="#00ff41" stroke-width="1.2"/>
    <circle cx="8" cy="8" r="2.4" fill="#0a0a0a" stroke="#00ff41" stroke-width="1.2"/>
    <circle cx="8" cy="8" r="0.8" fill="#00ff41"/>
    <rect x="6.8" y="0.6" width="2.4" height="2.4" fill="#00ff41" rx="0.6"/>
    <circle cx="13.4" cy="3.2" r="1.3" fill="#00ff41"/>
    <circle cx="13.4" cy="12.8" r="1.3" fill="#00ff41"/>
    <rect x="6.8" y="13" width="2.4" height="2.4" fill="#00ff41" rx="0.6"/>
    <polygon points="3,12.8 4.3,11.5 5.6,12.8 4.3,14.1" fill="#00ff41"/>
    <circle cx="2.6" cy="3.2" r="1.3" fill="#00ff41" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" fill="#e0e0e8" font-family="monospace" font-size="52" font-weight="700">asm <tspan fill="#00ff41">catalog</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" fill="#8888a0" font-family="sans-serif" font-size="24">Browse &amp; install {{SKILL_COUNT}}+ agent skills for AI coding agents</text>
  <!-- Stats -->
  <g transform="translate(600, 470)" text-anchor="middle">
    <text x="-200" fill="#00ff41" font-family="monospace" font-size="36" font-weight="700">{{SKILL_COUNT}}+</text>
    <text x="-200" y="30" fill="#8888a0" font-family="sans-serif" font-size="16">skills</text>
    <text x="0" fill="#00ff41" font-family="monospace" font-size="36" font-weight="700">{{REPO_COUNT}}</text>
    <text x="0" y="30" fill="#8888a0" font-family="sans-serif" font-size="16">repos</text>
    <text x="200" fill="#00ff41" font-family="monospace" font-size="36" font-weight="700">{{CATEGORY_COUNT}}</text>
    <text x="200" y="30" fill="#8888a0" font-family="sans-serif" font-size="16">categories</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#00ff41" opacity="0.15"/>
  <text x="600" y="622" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14">npm i -g agent-skill-manager</text>
</svg>
